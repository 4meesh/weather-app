<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-container">
      <form class="input-container">
        <input
          class="city-input"
          placeholder="Search City"
          type="text"
          aria-label="City name"
        />
        <button class="search-button" aria-label="Search city" type="submit">
          <span class="material-symbols-outlined" aria-hidden="true"
            >search</span
          >
        </button>
      </form>

      <section class="weather-info" style="display: none">
        <div class="location-date-container">
          <div class="location">
            <span class="material-symbols-outlined" aria-hidden="true"
              >location_on</span
            >
            <h4 class="country-txt">Kerala</h4>
          </div>
          <h5 class="current-date-txt regular-text">Sun, 01 June</h5>
        </div>

        <div class="weather-summary-container">
          <img
            src="assets/weather/clouds.svg"
            alt="Weather icon"
            class="weather-summary-img"
          />
          <div class="weather-summary-info">
            <h1 class="temp-txt">28°C</h1>
            <h3 class="condition-txt regular-text">Cloudy</h3>
          </div>
        </div>

        <div class="weather-details-container">
          <div class="condition-item">
            <span class="material-symbols-outlined">water_drop</span>
            <div class="condition-info">
              <h5 class="regular-text">Humidity</h5>
              <h5 class="humidity-value">60%</h5>
            </div>
          </div>

          <div class="condition-item">
            <span class="material-symbols-outlined">air</span>
            <div class="condition-info">
              <h5 class="regular-text">Wind Speed</h5>
              <h5 class="wind-value">2M/s</h5>
            </div>
          </div>
        </div>

        <div class="forecast-items-container">
          <div class="forecast-item">
            <h5 class="forecast-item-date regular-text">Mon</h5>
            <img
              src="assets/weather/thunderstorm.svg"
              alt="Thunderstorm"
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">27°C</h5>
          </div>

          <div class="forecast-item">
            <h5 class="forecast-item-date regular-text">Tue</h5>
            <img
              src="assets/weather/rain.svg"
              alt="Rain"
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">25°C</h5>
          </div>

          <div class="forecast-item">
            <h5 class="forecast-item-date regular-text">Wed</h5>
            <img
              src="assets/weather/partly-cloudy.svg"
              alt="Partly Cloudy"
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">28°C</h5>
          </div>

          <div class="forecast-item">
            <h5 class="forecast-item-date regular-text">Thu</h5>
            <img
              src="assets/weather/sunny.svg"
              alt="Sunny"
              class="forecast-item-img"
            />
            <h5 class="forecast-item-temp">31°C</h5>
          </div>
        </div>
      </section>

      <section class="search-city section-message">
        <!--img class="message-img" src="assets/icons/search-city.svg" class="search-city-icon"--->
        <div>
          <h1>Search City</h1>
          <h4 class="regular-text">
            Find out the weather conditions of the city
          </h4>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
